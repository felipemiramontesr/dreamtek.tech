name: Build and Deploy to Hostinger FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  qa_audit_and_build:
    name: 🧪 QA Audit & 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5

      - name: ⚙️ Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧹 Sniffers & Linter
        run: npm run lint

      - name: 🧪 Unit Testing (Vitest)
        run: npm run test -- --watch=false

      - name: 🏭 Build Next.js Static Export
        run: npm run build

      - name: 🚀 Deploy to Hostinger FTP (Native LFTP)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lftp > /dev/null
          lftp -c "set ftp:ssl-allow yes; set ftp:ssl-force true; set ssl:verify-certificate no; open -u $FTP_USER,$FTP_PASSWORD $FTP_SERVER; mirror -R ./out ./ --parallel=10 --ignore-time; quit"
