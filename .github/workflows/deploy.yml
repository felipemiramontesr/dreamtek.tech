name: Deploy to Hostinger (CD)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Build and FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v5

      - name: ⚙️ Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏭 Build Next.js Static Export
        run: npm run build

      - name: 🚀 Deploy to Hostinger FTP (Native LFTP)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lftp > /dev/null
          echo "=== Directorios en el servidor FTP ==="
          lftp -c "set ftp:ssl-allow yes; set ftp:ssl-force true; set ssl:verify-certificate no; open -u $FTP_USER,$FTP_PASSWORD $FTP_SERVER; ls; quit"
          echo "=== Eliminando carpeta out residual y archivos obsoletos ==="
          lftp -c "set ftp:ssl-allow yes; set ftp:ssl-force true; set ssl:verify-certificate no; open -u $FTP_USER,$FTP_PASSWORD $FTP_SERVER; rm -rf out privacidad.html privacidad.txt terminos.html terminos.txt; quit"
          echo "=== Iniciando Mirroring del contenido ==="
          lftp -c "set ftp:ssl-allow yes; set ftp:ssl-force true; set ssl:verify-certificate no; open -u $FTP_USER,$FTP_PASSWORD $FTP_SERVER; lcd ./out; mirror -R --parallel=10 --ignore-time; quit"
